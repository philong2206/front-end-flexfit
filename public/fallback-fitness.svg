    <rect x="155" y="88" width="230" height="90" rx="24" fill="#f8fafc" opacity="0.18"/>
  </g>
  <text x="600" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#f8fafc">FLEXFIT</text>
  <text x="600" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#cbd5e1">Fitness image placeholder</text>
